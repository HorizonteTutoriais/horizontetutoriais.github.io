<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoie o Projeto Horizonte Tutoriais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        
        /* Coração Pulsando */
        .icon { font-size: 100px; margin-top: 20px; margin-bottom: 20px; display: inline-block; animation: pulse 1.5s infinite; color: #7b61ff; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 { color: #333; font-size: 28px; margin-bottom: 10px; text-align: center; font-weight: bold; padding: 0 10px; }
        .subtitle { color: #666; font-size: 16px; margin-bottom: 30px; line-height: 1.5; text-align: center; max-width: 300px; }
        
        .pix-box { border: 2px dashed #7b61ff; padding: 25px; border-radius: 15px; margin-bottom: 30px; width: 100%; max-width: 350px; text-align: center; background: #fdfdff; }
        .pix-key { font-size: 15px; color: #333; font-weight: bold; word-break: break-all; margin-bottom: 20px; font-family: monospace; }
        
        .btn { background: #667eea; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
        .btn:hover { background: #5566c2; }
        
        .qr-section { margin-top: 10px; text-align: center; width: 100%; }
        .qr-code { width: 250px; height: 250px; margin: 15px auto; display: flex; align-items: center; justify-content: center; }
        .qr-code img { width: 100%; height: 100%; }
        
        .copy-feedback { color: #28a745; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="icon">💜</div>
    <h1>Apoie o Projeto Horizonte Tutoriais</h1>
    <p class="subtitle">Sua ajuda é fundamental para continuarmos desenvolvendo ferramentas gratuitas!</p>
    
    <div class="pix-box">
        <p style="font-size: 12px; color: #7b61ff; margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">Chave Pix (E-mail)</p>
        <div class="pix-key" id="pixKey">horizontetutoriais@gmail.com</div>
        <button class="btn" onclick="copiarChave()">📋 COPIAR CHAVE PIX</button>
        <div class="copy-feedback" id="feedback">✓ Copiado! Agora cole no seu banco.</div>
    </div>

    <div class="qr-section">
        <p style="font-size: 14px; color: #666; margin-bottom: 5px;">Ou escaneie o QR Code:</p>
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=horizontetutoriais@gmail.com" alt="QR Code Pix">
        </div>
    </div>

    <script>
        function copiarChave() {
            const pixKey = document.getElementById('pixKey').textContent;
            navigator.clipboard.writeText(pixKey).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => { feedback.style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
