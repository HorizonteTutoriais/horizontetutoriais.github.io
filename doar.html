<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoie o Projeto Horizonte Tutoriais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; /* Centraliza o bloco todo no meio da tela */
            padding: 20px; 
            color: #333;
        }
        
        /* Container que mantém tudo junto e grande */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px; /* Aumentado para permitir que os itens cresçam */
            text-align: center;
        }
        
        /* Coração Gigante */
        .icon { 
            font-size: 180px; 
            margin-bottom: 30px; 
            display: inline-block; 
            animation: pulse 1.5s infinite; 
            color: #7b61ff; 
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Títulos Maiores e Juntos */
        h1 { 
            color: #333; 
            font-size: 38px; 
            margin-bottom: 10px; 
            font-weight: 800; 
            line-height: 1.1;
        }
        .subtitle { 
            color: #666; 
            font-size: 22px; 
            margin-bottom: 50px; 
            line-height: 1.4; 
            max-width: 90%; 
        }
        
        /* Área do Pix Ampliada */
        .pix-box { 
            border: 4px dashed #7b61ff; 
            padding: 40px; 
            border-radius: 30px; 
            width: 100%; 
            margin-bottom: 50px; 
            background: #fdfdff; 
            box-shadow: 0 10px 40px rgba(123, 97, 255, 0.1);
        }
        .pix-label {
            font-size: 18px; 
            color: #7b61ff; 
            margin-bottom: 20px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        .pix-key { 
            font-size: 22px; 
            color: #333; 
            font-weight: bold; 
            word-break: break-all; 
            margin-bottom: 30px; 
            font-family: monospace;
            background: #f0f0f0;
            padding: 20px;
            border-radius: 15px;
        }
        
        /* Botão Enorme */
        .btn { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 28px; 
            width: 100%; 
            border-radius: 20px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            font-size: 24px; 
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        /* QR Code Gigante */
        .qr-section { width: 100%; }
        .qr-label { font-size: 22px; color: #666; font-weight: bold; margin-bottom: 20px; }
        .qr-code { 
            width: 380px; 
            height: 380px; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid #eee;
            padding: 20px;
            border-radius: 25px;
            background: white;
        }
        .qr-code img { width: 100%; height: 100%; }
        
        .copy-feedback { color: #28a745; font-weight: bold; margin-top: 20px; font-size: 22px; display: none; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Tudo agora está dentro deste container centralizado -->
        <div class="icon">💜</div>

        <h1>Apoie o Projeto Horizonte Tutoriais</h1>
        <p class="subtitle">Sua ajuda é fundamental para continuarmos crescendo!</p>
        
        <div class="pix-box">
            <p class="pix-label">Chave Pix (E-mail)</p>
            <div class="pix-key" id="pixKey">horizontetutoriais@gmail.com</div>
            <button class="btn" onclick="copiarChave()">📋 COPIAR CHAVE PIX</button>
            <div class="copy-feedback" id="feedback">✓ Chave Copiada!</div>
        </div>

        <div class="qr-section">
            <p class="qr-label">Ou escaneie o QR Code:</p>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=horizontetutoriais@gmail.com" alt="QR Code Pix">
            </div>
        </div>
    </div>

    <script>
        function copiarChave() {
            const pixKey = document.getElementById('pixKey').textContent;
            navigator.clipboard.writeText(pixKey).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => { feedback.style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
