<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoie o Projeto Horizonte Tutoriais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            color: white;
        }
        
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 700px;
            text-align: center;
        }
        
        /* Coração Gigante em Escala Máxima */
        .icon { 
            font-size: 220px; 
            margin-bottom: 20px; 
            display: inline-block; 
            animation: pulse 1.5s infinite; 
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Títulos Impactantes */
        h1 { 
            font-size: 42px; 
            margin-bottom: 10px; 
            font-weight: 900; 
            line-height: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle { 
            font-size: 24px; 
            margin-bottom: 40px; 
            line-height: 1.3; 
            max-width: 95%; 
            opacity: 0.9;
        }
        
        /* Área do Pix com fundo semi-transparente para contraste */
        .pix-box { 
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 4px dashed rgba(255, 255, 255, 0.5); 
            padding: 40px; 
            border-radius: 35px; 
            width: 100%; 
            margin-bottom: 40px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }
        .pix-label {
            font-size: 20px; 
            color: white; 
            margin-bottom: 15px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }
        .pix-key { 
            font-size: 24px; 
            color: #ffffff; 
            font-weight: bold; 
            word-break: break-all; 
            margin-bottom: 30px; 
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
        }
        
        /* Botão Enorme e Vibrante */
        .btn { 
            background: #ffffff; 
            color: #667eea; 
            border: none; 
            padding: 28px; 
            width: 100%; 
            border-radius: 20px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            font-size: 26px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .btn:active { transform: scale(0.98); }
        
        /* QR Code Gigante com borda branca */
        .qr-section { width: 100%; }
        .qr-label { font-size: 24px; color: white; font-weight: bold; margin-bottom: 15px; }
        .qr-code { 
            width: 420px; 
            height: 420px; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 5px solid white;
            padding: 20px;
            border-radius: 30px;
            background: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .qr-code img { width: 100%; height: 100%; }
        
        .copy-feedback { color: #fff; font-weight: bold; margin-top: 20px; font-size: 24px; text-shadow: 0 2px 5px rgba(0,0,0,0.3); display: none; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="icon">💜</div>

        <h1>Apoie o Projeto Horizonte Tutoriais</h1>
        <p class="subtitle">Sua ajuda nos mantém vivos e gratuitos!</p>
        
        <div class="pix-box">
            <p class="pix-label">Chave Pix (E-mail)</p>
            <div class="pix-key" id="pixKey">horizontetutoriais@gmail.com</div>
            <button class="btn" onclick="copiarChave()">📋 COPIAR CHAVE PIX</button>
            <div class="copy-feedback" id="feedback">✓ Chave Copiada com Sucesso!</div>
        </div>

        <div class="qr-section">
            <p class="qr-label">Ou escaneie o QR Code:</p>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=420x420&data=horizontetutoriais@gmail.com" alt="QR Code Pix">
            </div>
        </div>
    </div>

    <script>
        function copiarChave() {
            const pixKey = document.getElementById('pixKey').textContent;
            navigator.clipboard.writeText(pixKey).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => { feedback.style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
