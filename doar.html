<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoie o Projeto Horizonte Tutoriais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px 20px; 
            color: #333;
        }
        
        /* Coração Muito Maior e Pulsante */
        .icon { 
            font-size: 150px; 
            margin-top: 10px; 
            margin-bottom: 20px; 
            display: inline-block; 
            animation: pulse 1.5s infinite; 
            color: #7b61ff; 
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Títulos Maiores */
        h1 { 
            color: #333; 
            font-size: 32px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: 800; 
            line-height: 1.2;
        }
        .subtitle { 
            color: #666; 
            font-size: 18px; 
            margin-bottom: 40px; 
            line-height: 1.5; 
            text-align: center; 
            max-width: 90%; 
        }
        
        /* Área do Pix Ampliada */
        .pix-box { 
            border: 3px dashed #7b61ff; 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 40px; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            background: #fdfdff; 
        }
        .pix-key { 
            font-size: 18px; 
            color: #333; 
            font-weight: bold; 
            word-break: break-all; 
            margin-bottom: 25px; 
            font-family: monospace;
            background: #eee;
            padding: 10px;
            border-radius: 8px;
        }
        
        /* Botão Grande */
        .btn { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 22px; 
            width: 100%; 
            border-radius: 15px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            font-size: 18px; 
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* QR Code Gigante */
        .qr-section { 
            margin-top: 10px; 
            text-align: center; 
            width: 100%; 
        }
        .qr-code { 
            width: 300px; 
            height: 300px; 
            margin: 20px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 15px;
        }
        .qr-code img { width: 100%; height: 100%; }
        
        .copy-feedback { color: #28a745; font-weight: bold; margin-top: 20px; font-size: 18px; display: none; }
    </style>
</head>
<body>
    <div class="icon">💜</div>
    <h1>Apoie o Projeto Horizonte Tutoriais</h1>
    <p class="subtitle">Sua ajuda é fundamental para continuarmos desenvolvendo ferramentas gratuitas!</p>
    
    <div class="pix-box">
        <p style="font-size: 14px; color: #7b61ff; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Chave Pix (E-mail)</p>
        <div class="pix-key" id="pixKey">horizontetutoriais@gmail.com</div>
        <button class="btn" onclick="copiarChave()">📋 COPIAR CHAVE PIX</button>
        <div class="copy-feedback" id="feedback">✓ Chave Copiada!</div>
    </div>

    <div class="qr-section">
        <p style="font-size: 18px; color: #666; margin-bottom: 10px; font-weight: bold;">Ou escaneie o QR Code:</p>
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=horizontetutoriais@gmail.com" alt="QR Code Pix">
        </div>
    </div>

    <script>
        function copiarChave() {
            const pixKey = document.getElementById('pixKey').textContent;
            navigator.clipboard.writeText(pixKey).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => { feedback.style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
