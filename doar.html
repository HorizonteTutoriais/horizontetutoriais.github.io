<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoie o Projeto Horizonte Tutoriais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            color: white;
        }
        
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px; /* Limita o tamanho no computador */
            text-align: center;
        }
        
        /* Coração Responsivo */
        .icon { 
            font-size: 120px; 
            margin-bottom: 20px; 
            display: inline-block; 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Títulos que se adaptam ao tamanho da tela */
        h1 { 
            font-size: clamp(24px, 8vw, 36px); 
            margin-bottom: 10px; 
            font-weight: 900; 
            line-height: 1.1;
        }
        .subtitle { 
            font-size: clamp(16px, 4vw, 20px); 
            margin-bottom: 30px; 
            line-height: 1.4; 
            opacity: 0.9;
        }
        
        /* Caixa do Pix Responsiva */
        .pix-box { 
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px dashed rgba(255, 255, 255, 0.5); 
            padding: 20px; 
            border-radius: 25px; 
            width: 100%; 
            margin-bottom: 30px;
        }
        .pix-label {
            font-size: 14px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        .pix-key { 
            font-size: clamp(14px, 4vw, 18px); 
            font-weight: bold; 
            word-break: break-all; 
            margin-bottom: 20px; 
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
        }
        
        /* Botão que cabe no celular */
        .btn { 
            background: #ffffff; 
            color: #667eea; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 15px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            font-size: clamp(14px, 4vw, 18px); 
        }
        
        /* QR Code que nunca transborda */
        .qr-section { width: 100%; }
        .qr-label { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .qr-code { 
            width: min(300px, 80vw); /* Usa 300px ou 80% da largura da tela, o que for menor */
            height: min(300px, 80vw); 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 4px solid white;
            padding: 10px;
            border-radius: 20px;
            background: white;
        }
        .qr-code img { width: 100%; height: 100%; }
        
        .copy-feedback { font-weight: bold; margin-top: 15px; font-size: 16px; display: none; }

        /* Ajustes específicos para telas muito pequenas */
        @media (max-height: 600px) {
            .icon { font-size: 80px; }
            h1 { font-size: 20px; }
            .subtitle { margin-bottom: 15px; }
            .pix-box { margin-bottom: 15px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="icon">💜</div>

        <h1>Apoie o Projeto Horizonte Tutoriais</h1>
        <p class="subtitle">Sua ajuda nos mantém gratuitos!</p>
        
        <div class="pix-box">
            <p class="pix-label">Chave Pix (E-mail)</p>
            <div class="pix-key" id="pixKey">horizontetutoriais@gmail.com</div>
            <button class="btn" onclick="copiarChave()">📋 COPIAR CHAVE PIX</button>
            <div class="copy-feedback" id="feedback">✓ Copiado!</div>
        </div>

        <div class="qr-section">
            <p class="qr-label">Ou escaneie o QR Code:</p>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=horizontetutoriais@gmail.com" alt="QR Code Pix">
            </div>
        </div>
    </div>

    <script>
        function copiarChave() {
            const pixKey = document.getElementById('pixKey').textContent;
            navigator.clipboard.writeText(pixKey).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => { feedback.style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
