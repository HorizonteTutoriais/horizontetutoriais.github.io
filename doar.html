<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoie o Projeto Horizonte Tutoriais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-around; /* Espalha os elementos verticalmente */
            padding: 40px 20px; 
            color: #333;
        }
        
        /* Coração Gigante e Pulsante */
        .icon { 
            font-size: 180px; /* Aumentado de 150px para 180px */
            display: inline-block; 
            animation: pulse 1.5s infinite; 
            color: #7b61ff; 
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Títulos Maiores */
        .text-section { text-align: center; width: 100%; }
        h1 { 
            color: #333; 
            font-size: 36px; 
            margin-bottom: 10px; 
            font-weight: 800; 
            line-height: 1.1;
        }
        .subtitle { 
            color: #666; 
            font-size: 20px; 
            line-height: 1.4; 
            max-width: 90%; 
            margin: 0 auto;
        }
        
        /* Área do Pix Super Ampliada */
        .pix-box { 
            border: 4px dashed #7b61ff; 
            padding: 35px; 
            border-radius: 25px; 
            width: 100%; 
            max-width: 550px; 
            text-align: center; 
            background: #fdfdff; 
        }
        .pix-key { 
            font-size: 20px; 
            color: #333; 
            font-weight: bold; 
            word-break: break-all; 
            margin-bottom: 30px; 
            font-family: monospace;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
        }
        
        /* Botão Super Grande */
        .btn { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 25px; 
            width: 100%; 
            border-radius: 20px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            font-size: 22px; 
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* QR Code Enorme */
        .qr-section { 
            text-align: center; 
            width: 100%; 
        }
        .qr-code { 
            width: 350px; /* Aumentado de 300px para 350px */
            height: 350px; 
            margin: 15px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 20px;
            background: white;
        }
        .qr-code img { width: 100%; height: 100%; }
        
        .copy-feedback { color: #28a745; font-weight: bold; margin-top: 15px; font-size: 20px; display: none; }
    </style>
</head>
<body>
    <!-- Seção do Coração -->
    <div class="icon">💜</div>

    <!-- Seção de Texto -->
    <div class="text-section">
        <h1>Apoie o Projeto Horizonte Tutoriais</h1>
        <p class="subtitle">Sua ajuda é fundamental para continuarmos crescendo!</p>
    </div>
    
    <!-- Seção do Pix -->
    <div class="pix-box">
        <p style="font-size: 16px; color: #7b61ff; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">Chave Pix (E-mail)</p>
        <div class="pix-key" id="pixKey">horizontetutoriais@gmail.com</div>
        <button class="btn" onclick="copiarChave()">📋 COPIAR CHAVE PIX</button>
        <div class="copy-feedback" id="feedback">✓ Chave Copiada!</div>
    </div>

    <!-- Seção do QR Code -->
    <div class="qr-section">
        <p style="font-size: 20px; color: #666; font-weight: bold;">Ou escaneie o QR Code:</p>
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=horizontetutoriais@gmail.com" alt="QR Code Pix">
        </div>
    </div>

    <script>
        function copiarChave() {
            const pixKey = document.getElementById('pixKey').textContent;
            navigator.clipboard.writeText(pixKey).then(() => {
                const feedback = document.getElementById('feedback');
                feedback.style.display = 'block';
                setTimeout(() => { feedback.style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
